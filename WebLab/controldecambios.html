                    function obtenerClase(tipo) 

                {
                    tipo = tipo.toLowerCase();
                    if (tipo.includes('nueva')) return 'nueva';
                    if (tipo.includes('mejora')) return 'mejora';
                    if (tipo.includes('cambio')) return 'cambio';
                    return 'correccion';
                }

                    function renderizarTabla(lista) {

                        const tbody = document.querySelector('#tablaCambios tbody');

                        tbody.innerHTML = '';

                        // agrupar por fecha
                        const grupos = {};

                        lista.forEach(item => {

                            if (!grupos[item.fecha]) {
                                grupos[item.fecha] = [];
                            }

                            grupos[item.fecha].push(item);
                        });

                        // recorrer grupos
                        Object.keys(grupos).forEach(fecha => {

                            const items = grupos[fecha];

                            items.forEach((item, index) => {

                                const tr = document.createElement('tr');

                                // mostrar fecha solo en primera fila
                                if (index === 0) {

                                    tr.innerHTML = `
                    <td class="fecha" rowspan="${items.length}">
                        ${fecha}
                    </td>

                    <td class="modulo">${item.modulo}</td>

                    <td class="detalle">${item.detalle}</td>

                    <td class="tipo">
                        ${item.tipo}
                    </td>
                `;
                                }
                                else {

                                    tr.innerHTML = `
                    <td class="modulo">${item.modulo}</td>

                    <td class="detalle">${item.detalle}</td>

                    <td class="tipo">
                        ${item.tipo}
                    </td>
                `;
                                }

                                tbody.appendChild(tr);

                            });

                        });

                    }

                renderizarTabla(cambios); document.getElementById('buscar').addEventListener('keyup', function () {

            const texto = this.value.toLowerCase();

            const filtrado = cambios.filter(x =>
                x.modulo.toLowerCase().includes(texto) ||
                x.detalle.toLowerCase().includes(texto) ||
                x.fecha.toLowerCase().includes(texto)
            );

            renderizarTabla(filtrado);

        }); </script > </body > </html >
